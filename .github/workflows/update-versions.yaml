name: Update apps versions

on:
  schedule:
    - cron: "0 3 * * 0"  # Every Monday at 03:00
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update addon versions
        run: |
          set -e

          for dir in addons/*; do
            if [ -f "$dir/source.yaml" ] && [ -f "$dir/config.yaml" ]; then
              # Read GitHub repo
              REPO=$(grep github "$dir/source.yaml" | awk '{print $2}')

              echo "Processing $dir -> $REPO"

              # Get latest stable release using GitHub API
              LATEST=$(curl -s "https://api.github.com/repos/$REPO/releases/latest" \
                        | grep '"tag_name":' \
                        | head -n1 \
                        | sed -E 's/.*"([^"]+)".*/\1/')

              echo "Latests stable version: $LATEST"

              # Read current version from config.yaml
              CURRENT=$(grep '^version:' "$dir/config.yaml" | awk '{print $2}')

              echo "Current version: $CURRENT"

              if [ "$LATEST" != "$CURRENT" ]; then
                echo "Updating version in $dir/config.yaml to $LATEST"
                # Replace version
                sed -i -E "s/^version: .*/version: $LATEST/" "$dir/config.yaml"
          
                # Update release shield in README.md (if it exists)
                README="$dir/README.md"
                if [ -f "$README" ]; then
                  echo "Updating release shield in $README"
                  # Replaces version
                  sed -i -E "s|(version-)[^-]+(-[a-zA-Z]+\.svg)|\1$LATEST\2|" "$README"
                fi
              else
                echo "No changes in $dir"
              fi
            fi
          done

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add addons/*/config.yaml
          if ! git diff --cached --quiet; then
            git commit -m "Update addon versions and release shields"
            git push
          else
            echo "No changes to commit"
          fi